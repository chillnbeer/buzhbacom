<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Страница не найдена — бужба</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://buzhba.com/404.html" />
  <style>
    :root {
      --bg: #ffecd4;
      --text: #000;
      --border: #ccbeb4;
      --shadow: 0 24px 32px rgba(0, 0, 0, .08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      background: var(--bg);
      color: var(--text);
      font: 400 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    main {
      width: min(520px, 100%);
      text-align: center;
      padding: 48px 24px;
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 8vw, 56px);
      line-height: 1;
    }

    p {
      margin: 0 0 24px;
      font-size: 18px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      border-width: 2px;
    }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>Такой страницы на buzhba.com нет.</p>
    <a href="/">На главную</a>
  </main>
</body>
</html>
